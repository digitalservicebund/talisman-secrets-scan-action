# Dependabot doesn't support tracking arbitrary curl download URLs
name: Talisman Update

on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 6:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: talisman-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Read latest Talisman release
        id: latest_release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'thoughtworks',
              repo: 'talisman',
            });

            core.setOutput('tag', release.data.tag_name);
            core.setOutput('url', release.data.html_url);

      - name: Update pinned Talisman version
        id: update
        env:
          LATEST_TAG: ${{ steps.latest_release.outputs.tag }}
        run: |
          set -euo pipefail

          file="action.yml"

          current_tag="$(grep -oE 'talisman/releases/download/v[0-9]+\.[0-9]+\.[0-9]+' "$file" | head -1 | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')"

          if [ -z "$current_tag" ]; then
            echo "Could not find a pinned Talisman version in $file."
            exit 1
          fi

          current_version="${current_tag#v}"
          latest_version="${LATEST_TAG#v}"

          echo "current_tag=$current_tag" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          if [ "$current_version" = "$latest_version" ]; then
            echo "Talisman is already up to date ($LATEST_TAG)."
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$(printf '%s\n%s\n' "$current_version" "$latest_version" | sort -V | tail -n1)" != "$latest_version" ]; then
            echo "Latest release tag ($LATEST_TAG) is not newer than the pinned version ($current_tag)."
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sed -i "s|talisman/releases/download/${current_tag}/|talisman/releases/download/${LATEST_TAG}/|g" "$file"

          if ! grep -q "talisman/releases/download/${LATEST_TAG}/" "$file"; then
            echo "Expected $file to contain ${LATEST_TAG} after update."
            exit 1
          fi

          if grep -q "talisman/releases/download/${current_tag}/" "$file"; then
            echo "Detected old version ${current_tag} in $file after update."
            exit 1
          fi

          if git diff --quiet -- "$file"; then
            echo "No changes detected after attempted update."
            echo "should_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_update=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push update branch
        if: ${{ steps.update.outputs.should_update == 'true' }}
        id: push_branch
        env:
          LATEST_TAG: ${{ steps.update.outputs.latest_tag }}
        run: |
          set -euo pipefail

          branch="chore/talisman-${LATEST_TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$branch"
          git add action.yml
          git commit -m "chore(deps): bump talisman to ${LATEST_TAG}"
          git push --force --set-upstream origin "$branch"

          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: ${{ steps.update.outputs.should_update == 'true' }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          BRANCH: ${{ steps.push_branch.outputs.branch }}
          LATEST_TAG: ${{ steps.update.outputs.latest_tag }}
          CURRENT_TAG: ${{ steps.update.outputs.current_tag }}
          RELEASE_URL: ${{ steps.latest_release.outputs.url }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const base = 'main';
            const head = `${owner}:${process.env.BRANCH}`;
            const title = `chore(deps): bump talisman to ${process.env.LATEST_TAG}`;
            const body = [
              '## Talisman update',
              '',
              `This PR updates the pinned Talisman binary from ${process.env.CURRENT_TAG} to ${process.env.LATEST_TAG}.`,
              '',
              `- Release: ${process.env.RELEASE_URL}`,
              `- Compare: https://github.com/thoughtworks/talisman/compare/${process.env.CURRENT_TAG}...${process.env.LATEST_TAG}`,
              '',
              '_Generated by the talisman-update workflow._',
            ].join('\n');

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head,
              base,
              per_page: 100,
            });

            if (existing.length > 0) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing[0].number,
                title,
                body,
              });
              core.info(`Updated existing PR #${existing[0].number}.`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              base,
              head: process.env.BRANCH,
              title,
              body,
            });

            core.info(`Created PR #${created.data.number}.`);
